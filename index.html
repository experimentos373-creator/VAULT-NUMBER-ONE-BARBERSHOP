<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vault Number One Barbershop | Barbearia & Estética Masculina na Guia, Pombal</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="A Vault Number One Barbershop na Guia, Pombal, é um espaço premium de estética masculina liderado pelo barbeiro Ricardo Pedrosa. Cortes modernos, fade, mullet e cuidados com a barba." />
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Vault Number One Barbershop | Barbearia na Guia, Pombal" />
    <meta property="og:description" content="Estética masculina, cortes modernos (fade, mullet) e barba de alta precisão. Espaço de convívio e profissionalismo por Ricardo Pedrosa." />
    <meta property="og:image" content="/vault_hero.png" />
    <meta property="og:type" content="website" />
    
    <!-- Preload Mobile LCP Hero Image -->
    <link rel="preload" href="/vault_hero.png" as="image" fetchpriority="high" />

    <!-- Google Fonts: Space Grotesk & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;900&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;900&display=swap">
    </noscript>
  </head>
  <body class="bg-[#0C0C0C] text-white antialiased selection:bg-[#D4AF37] selection:text-black">
    <div id="root">
      <!-- Instant Hero Skeleton (Pre-render for 100/100 Lighthouse LCP) -->
      <section style="position: relative; min-height: 85vh; background-color: #0c0c0c; color: white; display: flex; flex-direction: column; justify-content: center; overflow: hidden; padding-top: 7rem; padding-bottom: 3rem; text-align: left; font-family: 'Space Grotesk', system-ui, sans-serif;">
        <div style="position: absolute; inset: 0; z-index: 0;">
          <img src="/vault_hero.png" alt="Vault Number One Barbershop" style="width: 100%; height: 100%; object-fit: cover; object-position: center; opacity: 0.45; transform: scale(1.05);" />
          <div style="position: absolute; inset: 0; background: linear-gradient(to right, rgba(12,12,12,0.95) 0%, rgba(12,12,12,0.6) 100%);"></div>
        </div>
        <div style="max-w: 80rem; margin-left: auto; margin-right: auto; padding-left: 1.5rem; padding-right: 1.5rem; width: 100%; position: relative; z-index: 10; box-sizing: border-box;">
          <div style="display: inline-flex; align-items: center; gap: 0.5rem; background-color: rgba(12, 12, 12, 0.9); border: 1px solid #262626; padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 600; color: #e5e5e5; margin-bottom: 1.5rem; border-radius: 9999px;">
            <span style="color: #D4AF37;">★★★★★</span>
            <span>5.0</span>
            <span style="width: 6px; height: 6px; border-radius: 50%; background-color: rgba(212, 175, 55, 0.4);"></span>
            <span>Espaço Moderno & Industrial</span>
          </div>
          <h1 style="font-size: 3rem; font-weight: 900; letter-spacing: -0.05em; line-height: 0.9; margin: 0 0 1.5rem 0; text-transform: uppercase;">
            VAULT NUMBER <br />
            <span style="color: #D4AF37;">ONE BARBERSHOP</span>
          </h1>
          <div style="width: 6rem; height: 4px; background-color: #D4AF37; margin-bottom: 1.5rem;"></div>
          <p style="font-size: 1.125rem; color: #d4d4d4; max-width: 36rem; margin: 0 0 2.5rem 0; line-height: 1.625;">
            Espaço de estética masculina e barbearia na Guia, Pombal. Estilo clássico com precisão moderna por Ricardo Pedrosa.
          </p>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
